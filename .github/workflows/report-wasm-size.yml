name: Report / WASM Size

on:
  pull_request:
    branches: [main]
    paths:
      - .github/actions/setup-rust/**
      - .github/workflows/report-wasm-size.yml
      - .cargo/config.toml
      - .github/package.json
      - .size-limit.json
      - Cargo.toml
      - Cargo.lock
      - Makefile.toml
      - rust-toolchain.toml
      - contracts/**/*.rs
      - contracts/**/Cargo.toml
      - packages/**/*.rs
      - packages/**/Cargo.toml

concurrency:
  group: report-wasm-size-${{ github.ref }}
  cancel-in-progress: true

jobs:
  report-wasm-size:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Prepare size limit
        run: cp .github/package.json package.json

      - name: Report wasm size limit
        uses: andresz1/size-limit-action@v1
        with:
          github_token: ${{ secrets.OPS_TOKEN }}
