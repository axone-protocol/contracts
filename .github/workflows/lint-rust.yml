name: Lint / Rust

on:
  workflow_call:

  push:
    branches: [main]
    paths:
      - .github/workflows/lint-rust.yml
      - .github/actions/setup-nix/action.yml
      - .cargo/config.toml
      - .sort-derives.toml
      - Cargo.toml
      - Cargo.lock
      - Cranky.toml
      - clippy.toml
      - Makefile.toml
      - rust-toolchain.toml
      - flake.nix
      - flake.lock
      - contracts/**/*.rs
      - contracts/**/Cargo.toml
      - packages/**/*.rs
      - packages/**/Cargo.toml
      - scripts/**/*.rs
      - scripts/**/Cargo.toml

  pull_request:
    branches: [main]
    paths:
      - .github/workflows/lint-rust.yml
      - .github/actions/setup-nix/action.yml
      - .cargo/config.toml
      - .sort-derives.toml
      - Cargo.toml
      - Cargo.lock
      - Cranky.toml
      - clippy.toml
      - Makefile.toml
      - rust-toolchain.toml
      - flake.nix
      - flake.lock
      - contracts/**/*.rs
      - contracts/**/Cargo.toml
      - packages/**/*.rs
      - packages/**/Cargo.toml
      - scripts/**/*.rs
      - scripts/**/Cargo.toml

permissions:
  contents: read

concurrency:
  group: lint-rust-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-rust:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            ~/.rustup
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Lint rust code
        run: nix develop -c cargo make lint-rust
