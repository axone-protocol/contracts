name: Report / WASM Size

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/report-wasm-size.yml
      - .cargo/config.toml
      - .github/package.json
      - .size-limit.json
      - Cargo.toml
      - Cargo.lock
      - Makefile.toml
      - rust-toolchain.toml
      - contracts/**/*.rs
      - contracts/**/Cargo.toml
      - packages/**/*.rs
      - packages/**/Cargo.toml

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: report-wasm-size-${{ github.ref }}
  cancel-in-progress: true

jobs:
  report-wasm-size:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache cargo registry
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1

      - name: Install cargo make
        uses: davidB/rust-cargo-make@291dc18d931d07d4960a5c40e9b6afcea9287f5b # v1

      - name: Prepare size limit
        run: cp .github/package.json package.json

      - name: Report wasm size limit
        uses: andresz1/size-limit-action@e7493a72a44b113341c0cf6186ab49c17c4b65c1 # v1
        with:
          github_token: ${{ secrets.OPS_TOKEN }}
