name: Lint / Cargo.toml

on:
  workflow_call:

  push:
    branches: [main]
    paths:
      - .github/workflows/lint-cargo-toml.yml
      - .github/actions/setup-nix/action.yml
      - Cargo.toml
      - Makefile.toml
      - flake.nix
      - flake.lock
      - contracts/**/Cargo.toml
      - packages/**/Cargo.toml
      - scripts/**/Cargo.toml

  pull_request:
    branches: [main]
    paths:
      - .github/workflows/lint-cargo-toml.yml
      - .github/actions/setup-nix/action.yml
      - Cargo.toml
      - Makefile.toml
      - flake.nix
      - flake.lock
      - contracts/**/Cargo.toml
      - packages/**/Cargo.toml
      - scripts/**/Cargo.toml

permissions:
  contents: read

concurrency:
  group: lint-cargo-toml-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-cargo-toml:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            ~/.rustup
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Lint all Cargo.toml files
        run: nix develop -c cargo make lint-cargo-toml

      - name: Lint all unused dependencies in Cargo.toml files
        run: nix develop -c cargo make lint-cargo-deps
