name: Lint / TOML Format

on:
  workflow_call:

  push:
    branches: [main]
    paths:
      - .github/workflows/lint-toml-format.yml
      - .taplo.toml
      - '*.toml'
      - '**/*.toml'

  pull_request:
    branches: [main]
    paths:
      - .github/workflows/lint-toml-format.yml
      - .taplo.toml
      - '*.toml'
      - '**/*.toml'

permissions:
  contents: read

concurrency:
  group: lint-toml-format-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-toml-format:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup rust
        uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1

      - name: Install cargo make
        uses: davidB/rust-cargo-make@184c522bf8152f601a20749ca36c742b57ba568b # v1

      - name: Check toml files are formatted
        run: |
          cargo make format-toml
          if git status -s | grep -q .toml; then
            >&2 echo "❌ There is a diff between formatted files and source code"
            >&2 git status
            exit 1
          fi
