name: Deploy Contracts / Testnet

"on":
  workflow_dispatch:
    inputs:
      contract:
        description: Contract name to deploy (for example, axone-gov)
        required: true
        type: string
      ref:
        description: Git ref to deploy (tag, branch, or SHA)
        required: false
        default: main
        type: string
      deploy_abstract:
        description: Deploy Abstract infrastructure before publishing the contract
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-contracts-testnet
  cancel-in-progress: false

jobs:
  deploy-contract:
    if: github.repository == 'axone-protocol/contracts'
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - name: Validate contract
        shell: bash
        run: |
          set -euo pipefail

          contract="${{ inputs.contract }}"
          if [[ ! -d "contracts/${contract}" ]]; then
            echo "Unknown contract: ${contract}" >&2
            echo "Expected to find contracts/${contract}" >&2
            exit 1
          fi

      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            ~/.rustup
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Deploy Abstract to Axone testnet
        if: inputs.deploy_abstract
        env:
          RUST_LOG: info
          TEST_MNEMONIC: ${{ secrets.AXONE_GITHUB_TESTNET_WALLET }}
        run: nix develop -c cargo make deploy-abstract testnet

      - name: Deploy contract to Axone testnet
        env:
          RUST_LOG: info
          TEST_MNEMONIC: ${{ secrets.AXONE_GITHUB_TESTNET_WALLET }}
          CONTRACT: ${{ inputs.contract }}
        run: nix develop -c cargo make deploy-contract "${CONTRACT}" testnet
