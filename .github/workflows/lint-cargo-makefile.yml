name: Lint / Cargo Makefile

on:
  workflow_call:

  push:
    branches: [main]
    paths:
      - .github/workflows/lint-cargo-makefile.yml
      - Makefile.toml

  pull_request:
    branches: [main]
    paths:
      - .github/workflows/lint-cargo-makefile.yml
      - Makefile.toml

permissions:
  contents: read

concurrency:
  group: lint-cargo-makefile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-cargo-makefile:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache cargo registry
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1

      - name: Install cargo make
        uses: davidB/rust-cargo-make@184c522bf8152f601a20749ca36c742b57ba568b # v1

      - name: Lint cargo-make task names
        run: |
          FAILED=0
          for task in $(cargo make --list-all-steps | awk '{print $1;}' | sort | grep -v -- '---' ); do
            if echo "$task" | grep '_' > /dev/null; then
              >&2 echo "❌ $task - use kebab-case style for task names (e.g. 'my-task' instead of 'my_task')"
              FAILED=1
            else
              echo "✅ $task"
            fi
          done
          if [ "${FAILED}" = "1" ]; then
            exit 1
          fi
