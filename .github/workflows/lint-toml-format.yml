name: Lint / TOML Format

on:
  workflow_call:

  push:
    branches: [main]
    paths:
      - .github/workflows/lint-toml-format.yml
      - .taplo.toml
      - '*.toml'
      - '**/*.toml'

  pull_request:
    branches: [main]
    paths:
      - .github/workflows/lint-toml-format.yml
      - .taplo.toml
      - '*.toml'
      - '**/*.toml'

permissions:
  contents: read

concurrency:
  group: lint-toml-format-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-toml-format:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache cargo registry
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1

      - name: Install cargo make
        uses: davidB/rust-cargo-make@291dc18d931d07d4960a5c40e9b6afcea9287f5b # v1

      - name: Check toml files are formatted
        run: |
          cargo make format-toml
          if [[ $(git status -s | grep .toml) ]]; then
            >&2 echo "❌ There is a diff between formatted files and source code"
            >&2 git status
            exit 1
          fi
