name: Lint / Rust

on:
  workflow_call:

  push:
    branches: [main]
    paths:
      - .github/workflows/lint-rust.yml
      - .cargo/config.toml
      - .sort-derives.toml
      - Cargo.toml
      - Cargo.lock
      - Cranky.toml
      - clippy.toml
      - Makefile.toml
      - rust-toolchain.toml
      - contracts/**/*.rs
      - contracts/**/Cargo.toml
      - packages/**/*.rs
      - packages/**/Cargo.toml
      - scripts/**/*.rs
      - scripts/**/Cargo.toml

  pull_request:
    branches: [main]
    paths:
      - .github/workflows/lint-rust.yml
      - .cargo/config.toml
      - .sort-derives.toml
      - Cargo.toml
      - Cargo.lock
      - Cranky.toml
      - clippy.toml
      - Makefile.toml
      - rust-toolchain.toml
      - contracts/**/*.rs
      - contracts/**/Cargo.toml
      - packages/**/*.rs
      - packages/**/Cargo.toml
      - scripts/**/*.rs
      - scripts/**/Cargo.toml

permissions:
  contents: read

concurrency:
  group: lint-rust-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-rust:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache cargo registry
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1

      - name: Install cargo make
        uses: davidB/rust-cargo-make@184c522bf8152f601a20749ca36c742b57ba568b # v1

      - name: Lint rust code
        run: cargo make lint-rust
