name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no tags/releases created)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  lint-commits:
    if: github.repository == 'axone-protocol/contracts' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/lint-commits.yml

  lint-markdown:
    if: github.repository == 'axone-protocol/contracts' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/lint-markdown.yml

  lint-yaml:
    if: github.repository == 'axone-protocol/contracts' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/lint-yaml.yml

  lint-cargo-toml:
    if: github.repository == 'axone-protocol/contracts' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/lint-cargo-toml.yml

  lint-cargo-makefile:
    if: github.repository == 'axone-protocol/contracts' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/lint-cargo-makefile.yml

  lint-rust:
    if: github.repository == 'axone-protocol/contracts' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/lint-rust.yml

  lint-rust-format:
    if: github.repository == 'axone-protocol/contracts' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/lint-rust-format.yml

  lint-toml:
    if: github.repository == 'axone-protocol/contracts' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/lint-toml.yml

  lint-toml-format:
    if: github.repository == 'axone-protocol/contracts' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/lint-toml-format.yml

  lint-typos:
    if: github.repository == 'axone-protocol/contracts' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/lint-typos.yml

  check-contracts:
    if: github.repository == 'axone-protocol/contracts' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/check-contracts.yml

  check-docs-updated:
    if: github.repository == 'axone-protocol/contracts' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/check-docs-updated.yml

  check-readme-updated:
    if: github.repository == 'axone-protocol/contracts' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/check-readme-updated.yml

  build-wasm:
    if: github.repository == 'axone-protocol/contracts' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/build-wasm.yml

  test-rust:
    if: github.repository == 'axone-protocol/contracts' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/test-rust.yml

  check-configured-projects:
    if: github.repository == 'axone-protocol/contracts' && github.ref == 'refs/heads/main'
    needs:
      - lint-commits
      - lint-markdown
      - lint-yaml
      - lint-cargo-toml
      - lint-cargo-makefile
      - lint-rust
      - lint-rust-format
      - lint-toml
      - lint-toml-format
      - lint-typos
      - check-contracts
      - check-docs-updated
      - check-readme-updated
      - build-wasm
      - test-rust
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: set-matrix
        run: |
          PROJECT_DIRS=$(find contracts packages -maxdepth 2 -name "pyproject.toml" -print0 \
            | xargs -0 -n1 dirname \
            | jq -R -s -c 'split("\n")[:-1]')

          echo "Found projects: $PROJECT_DIRS"
          echo "matrix=$PROJECT_DIRS" >> $GITHUB_OUTPUT

  release:
    needs: check-configured-projects
    if: ${{ needs.check-configured-projects.outputs.matrix != '[]' && needs.check-configured-projects.outputs.matrix != '' }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        project_dir: ${{ fromJSON(needs.check-configured-projects.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.OPS_TOKEN }}

      - name: Configure git author from token
        id: git-config
        run: |
          BOT_NAME=$(gh api user --jq .login)
          BOT_EMAIL="${BOT_NAME}@users.noreply.github.com"
          git config user.name "${BOT_NAME}"
          git config user.email "${BOT_EMAIL}"
          echo "Configured git author: ${BOT_NAME} <${BOT_EMAIL}>"
          echo "bot_name=${BOT_NAME}" >> $GITHUB_OUTPUT
          echo "bot_email=${BOT_EMAIL}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.OPS_TOKEN }}

      - name: Sync to latest remote
        run: |
          git fetch --tags origin
          git fetch origin "+refs/heads/*:refs/remotes/origin/*"
          git checkout "${GITHUB_REF_NAME}"
          git reset --hard "origin/${GITHUB_REF_NAME}"

      - name: Cache cargo registry
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1

      - name: Install cargo make
        uses: davidB/rust-cargo-make@291dc18d931d07d4960a5c40e9b6afcea9287f5b # v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build WASM artifacts
        run: cargo make release-wasm

      - name: Python Semantic Release (Dry Run)
        if: github.event.inputs.dry_run == 'true'
        run: |
          pip install "python-semantic-release>=10,<11"
          cd ${{ matrix.project_dir }}
          semantic-release -vv --noop version
        env:
          GH_TOKEN: ${{ secrets.OPS_TOKEN }}

      - name: Python Semantic Release (Real)
        if: github.event.inputs.dry_run != 'true'
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10
        with:
          directory: ${{ matrix.project_dir }}
          github_token: ${{ secrets.OPS_TOKEN }}
          git_committer_name: ${{ steps.git-config.outputs.bot_name }}
          git_committer_email: ${{ steps.git-config.outputs.bot_email }}
          verbosity: 1
          strict: true
