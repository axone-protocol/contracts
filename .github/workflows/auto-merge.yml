name: Auto merge

on:
  pull_request:

permissions:
  contents: read

jobs:
  auto-merge-dependabot:
    runs-on: ubuntu-22.04
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Auto merge PR
        uses: ahmadnassri/action-dependabot-auto-merge@45fc124d949b19b6b8bf6645b6c9d55f4f9ac61a # v2
        with:
          target: minor
          github-token: ${{ secrets.OPS_TOKEN }}
