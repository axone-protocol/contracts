name: Setup Rust
description: Prepare the Rust toolchain, cache cargo artifacts, and install cargo-make.

runs:
  using: composite
  steps:
    - name: Cache cargo registry
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          ~/.cargo/bin
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Setup rust
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Install cargo make
      uses: davidB/rust-cargo-make@v1
