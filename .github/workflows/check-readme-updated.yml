name: Check / README Updated

on:
  workflow_call:

  push:
    branches: [main]
    paths:
      - .github/workflows/check-readme-updated.yml
      - .github/actions/setup-nix/action.yml
      - Makefile.toml
      - flake.nix
      - flake.lock
      - README.md

  pull_request:
    branches: [main]
    paths:
      - .github/workflows/check-readme-updated.yml
      - .github/actions/setup-nix/action.yml
      - Makefile.toml
      - flake.nix
      - flake.lock
      - README.md

permissions:
  contents: read

concurrency:
  group: check-readme-updated-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-readme-updated:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            ~/.rustup
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Generate readme
        run: nix develop -c cargo make readme

      - name: Verify changed readme files
        id: verify-changed-readme-files
        uses: tj-actions/verify-changed-files@a1c6acee9df209257a246f2cc6ae8cb6581c1edf # v20
        with:
          files: |
            README.md

      - name: Run step only when files change.
        if: steps.verify-changed-readme-files.outputs.files_changed == 'true'
        run: |
          echo "❌ README.md has been updated."
          echo "  Changed files : ${{ steps.verify-changed-readme-files.outputs.changed_files }}"
          git diff --name-only | grep 'README.md' | while read -r file; do
            echo "‣ Changes in $file:"
            git diff HEAD "$file"
          done
          echo "Please generate readme using \`cargo make readme\` then commit this new documentation."
          exit 1
